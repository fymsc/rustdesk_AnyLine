name: RustDesk Custom Build

on:
  workflow_dispatch:

jobs:

  build-windows:

    runs-on: windows-latest

    steps:

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: Build Windows
      run: cargo build --release

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: windows-client
        path: target/release/*.exe


  build-linux:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: Build Linux
      run: cargo build --release

    - uses: actions/upload-artifact@v4
      with:
        name: linux-client
        path: target/release/*


  build-android:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'

    - name: Build APK
      run: |
        cd flutter
        flutter build apk --release

    - uses: actions/upload-artifact@v4
      with:
        name: android-client
        path: flutter/build/app/outputs/flutter-apk/app-release.apk
